  synthesis:
    two_stage_asr_llm_correction:
      description: "Most impactful improvement path for Voice Helper"
      evidence:
        - "S11: LLM Judge-Editor over top-k hypotheses achieves 14.51% WER reduction on dysarthric speech"
        - "S12: All systems (including Gemini) exceed 49% WER on severe dysarthria in zero-shot mode"
        - "S13: Two-stage ASR+GER framework effective on structured and spontaneous speech"
        - "S15: Confidence-guided prompting achieves 47% WER reduction on TORGO"
        - "S16: HyPoradise proves LLM can recover tokens missing from all N-best candidates"
        - "S17: Three-stage RLLM-CF prevents hallucination — critical for assistive use"
      applicability_to_voice_helper: |
        HIGH. Current architecture is single-pass zero-shot with no correction layer.
        Implementation path:
        1. Generate multiple transcription hypotheses (via separate Gemini calls with different temperature/prompts, or via structured output requesting alternatives)
        2. Feed hypotheses to a correction LLM call with chain-of-thought reasoning
        3. Use confidence estimation to avoid overcorrection
        Key challenge: Gemini API doesn't natively produce N-best ASR hypotheses like traditional ASR systems.
        Workaround: Multiple calls with varying temperature, or request alternatives in structured output schema.

    prompt_engineering_for_gemini:
      description: "Immediate, no-cost improvement for current architecture"
      evidence:
        - "S4: Few-shot examples strongly improve over zero-shot; use XML tags for Gemini 3"
        - "S5: System instructions set persistent expert persona across turns"
        - "S12: CRITICAL — verbatim prompts DEGRADE Gemini (improve GPT-4o). Prompt engineering is architecture-specific."
        - "S2: thinkingLevel='high' may help interpret ambiguous dysarthric speech"
        - "S17: Chain-of-thought sub-tasks improve error correction quality"
      applicability_to_voice_helper: |
        HIGH. Current prompt is basic zero-shot with minimal context.
        Immediate improvements:
        1. Add system_instruction with expert persona (speech-language pathologist, familiar with post-stroke aphasia/dysarthria)
        2. Include few-shot examples of dysarthric utterances and their correct interpretations
        3. Use XML-tagged structure for Gemini 3: <context>, <audio>, <instructions>
        4. Add domain vocabulary hints (family names, common phrases the user might say)
        5. Enable thinkingLevel for complex interpretations
        WARNING: S12 shows Gemini-specific prompt effects — must test empirically, not assume GPT-tested strategies transfer.

    structured_output_and_confidence:
      description: "Enable richer transcription results with confidence scoring and alternatives"
      evidence:
        - "S1: Gemini API supports JSON schema for audio transcription"
        - "S3: response_json_schema with Pydantic/Zod integration"
        - "S15: Confidence scores critical for directing correction to uncertain regions"
        - "S11: Semantic scores alongside WER needed for meaningful evaluation"
        - "S34: WER/CER inadequate for dysarthric speech — semantic metrics needed"
      applicability_to_voice_helper: |
        HIGH. Current TranscriptionResult only has {text, isError}.
        Implementation:
        1. Define JSON schema requesting: primary_transcription, confidence (0-1), alternative_interpretations[], thinking_notes
        2. Use confidence to trigger re-recording prompt for very low scores
        3. Display alternatives for user selection when confidence is moderate
        4. Track semantic consistency across conversation turns

    audio_preprocessing:
      description: "Client-side audio enhancement before API submission"
      evidence:
        - "S8-S10: Web Audio API provides full DSP toolkit in browser"
        - "S1: Gemini downsamples to 16KHz — preprocessing should target this"
        - "S9: DynamicsCompressorNode normalizes loudness variation (common in dysarthric speech)"
        - "S22: Rhythm/prosody normalization helps severe dysarthria"
      applicability_to_voice_helper: |
        MEDIUM. Gemini's 16KHz downsampling means high-frequency enhancement is wasted.
        However, loudness normalization and noise reduction likely help.
        Implementation:
        1. AudioContext processing chain: MediaStream → GainNode → DynamicsCompressorNode → MediaRecorder
        2. Configure compressor for speech: threshold=-30dB, ratio=4, knee=10
        3. Optionally add AnalyserNode to detect silence/noise and prompt user
        4. CAUTION: Unknown whether Gemini's native audio processing already handles normalization.
        Must A/B test preprocessing ON vs OFF.

    speaker_personalization:
      description: "Adapt recognition to the specific user over time"
      evidence:
        - "S19: Random same-speaker examples yield 40% WER reduction"
        - "S20: Two-stage SI→SS adaptation consistently improves on direct fine-tuning; covers aphasic speech"
        - "S25: Voiceitt requires 50+ recordings for personalized model"
        - "S26: Apple Personal Voice uses ~15 minutes of recordings"
        - "S30: Both idiosyncratic and generalizable approaches have merit"
        - "S31-S32: TTS-based augmentation can create synthetic training data from limited samples"
      applicability_to_voice_helper: |
        MEDIUM-HIGH (longer term). Cannot fine-tune Gemini via API, but can emulate personalization:
        1. Rolling context: maintain last N successful transcription pairs in conversation history
        2. Few-shot injection: include verified transcription examples in each prompt
        3. Vocabulary profile: build and maintain a vocabulary list of words the user commonly says
        4. Session memory: accumulate successful transcriptions across sessions, inject as examples
        Key insight from S19: even RANDOM previous recordings from the same speaker help dramatically.

    evaluation_beyond_wer:
      description: "Use semantic metrics for meaningful quality assessment"
      evidence:
        - "S11: WER sensitive to domain shift; semantic metrics correlate better with downstream performance"
        - "S12: Communicative intent partially recoverable despite high WER"
        - "S34: WER/CER fail to capture intelligibility; phonetic/semantic/NLI approaches needed"
      applicability_to_voice_helper: |
        HIGH for development/iteration. When testing improvements:
        1. Don't just measure WER — assess whether the MEANING is correct
        2. Use LLM-as-judge to evaluate semantic similarity between transcription and intended meaning
        3. Track user confirmation rate as real-world semantic accuracy proxy
        4. The user's grandpa may appreciate "got the gist right" more than "every word exact"

domain_security_considerations:
  sensitive_areas:
    - area: "API Key Management"
      location: server.js
      concern: "API_KEY loaded from environment, proxied server-side — correctly implemented"
    - area: "Audio Data Privacy"
      location: "server.js /api/transcribe"
      concern: "Raw audio of vulnerable user (elderly, post-stroke) sent to Google API. Consider: data retention policies, HIPAA if used in healthcare context, user consent."
    - area: "Request Size"
      location: "server.js:18"
      concern: "50MB JSON limit — appropriate for audio but should validate/sanitize input"
  authentication_patterns_in_domain: "No user authentication — single-user local app assumption"
  authorization_patterns_in_domain: "API key is sole access control"
  data_validation_in_domain: "Minimal — mimeType sanitized for codec params, base64Audio presence checked"

testing_patterns:
  framework: "None — no test files found"
  coverage_areas: []
  test_organization: "N/A"
  mock_patterns: []

open_questions:
  - question: "Does client-side audio preprocessing (compression, normalization) improve or degrade Gemini's transcription quality given its internal 16KHz downsampling?"
    context: "Gemini downsamples to 16KHz internally. Unknown whether its preprocessing already normalizes loudness. Adding compression could either help (consistent levels) or hurt (added artifacts)."
    type: decision_blocker
    affects: ["audio_preprocessing_implementation"]

  - question: "Can Gemini 3 Flash Preview be prompted to generate multiple alternative transcription hypotheses in a single API call, or does it require multiple calls?"
    context: "The two-stage ASR+LLM pattern requires N-best hypotheses. Traditional ASR outputs these natively. Gemini's structured output might support alternatives[] in schema, but this is unverified."
    type: decision_blocker
    affects: ["two_stage_correction_implementation"]

  - question: "What is the optimal prompt structure for Gemini 3 specifically for dysarthric speech, given that S12 showed Gemini-specific degradation with prompts that help GPT-4o?"
    context: "Must empirically test various prompt strategies (few-shot, system instruction, XML tags, thinking mode) specifically on Gemini 3 Flash with the target user's speech samples."
    type: research
    affects: ["prompt_engineering_implementation"]

  - question: "How should rolling context / conversation history be managed given Gemini's token limits and the app's current stateless request model?"
    context: "S19 shows same-speaker examples yield 40% WER reduction. Implementation requires maintaining state across requests, currently not supported."
    type: research
    affects: ["speaker_personalization_implementation"]

  - question: "Is Gemini Live API (real-time streaming) more appropriate than batch transcription for this use case?"
    context: "S6 shows Gemini 2.5 Flash supports Live API with native audio. Real-time feedback might help the user know when their speech is being understood."
    type: nice_to_know
    affects: ["architecture_redesign"]

gaps:
  - area: "Empirical Gemini-specific prompt testing"
    description: "No published research tests Gemini 3 Flash specifically on dysarthric speech with various prompt strategies. S12 tested Gemini 2.5 Pro/Flash. The Gemini 3 Flash Preview model may behave differently."
    impact: decision_blocker
    affects: ["prompt_engineering_implementation"]

  - area: "Audio preprocessing impact on Gemini"
    description: "No published research evaluates whether client-side audio preprocessing helps or hurts Gemini's native audio understanding pipeline. Gemini may already handle normalization internally."
    impact: research_blocker
    affects: ["audio_preprocessing_implementation"]

  - area: "Gemini N-best hypothesis generation"
    description: "Unclear whether Gemini's structured output can produce ranked alternative transcriptions comparable to traditional ASR N-best lists for the GER pattern."
    impact: decision_blocker
    affects: ["two_stage_correction_implementation"]

  - area: "Privacy and data handling"
    description: "No privacy policy or data handling documentation. User is elderly/vulnerable — audio data sent to Google API with unknown retention."
    impact: nice_to_know
    affects: ["deployment_considerations"]

  - area: "User testing and feedback loop"
    description: "No mechanism to capture user corrections/confirmations to improve prompts over time. The app has REVIEW state but unclear if corrections are stored."
    impact: nice_to_know
    affects: ["speaker_personalization_implementation"]

# ============================================================================
# PRIORITY-RANKED IMPLEMENTATION RECOMMENDATIONS SUMMARY
# (Factual ranking based on evidence strength and implementation feasibility)
# ============================================================================
# 1. PROMPT ENGINEERING (S4, S5, S12) — Highest ROI, zero infrastructure cost
#    Evidence: Few-shot > zero-shot consistently; system_instruction available
#    Risk: Gemini-specific effects require empirical testing
#
# 2. STRUCTURED OUTPUT (S1, S3, S15) — Enables confidence scoring and alternatives
#    Evidence: API fully supports JSON schemas; confidence critical for correction
#    Risk: Low — well-documented API feature
#
# 3. TWO-STAGE CORRECTION (S11, S13, S15-S17) — Largest WER improvement potential
#    Evidence: 14-47% WER reductions across multiple papers
#    Risk: Medium — requires additional API call, latency increase
#
# 4. AUDIO PREPROCESSING (S8-S10) — Quick client-side improvement
#    Evidence: Web Audio API readily available; compression helps variable loudness
#    Risk: Medium — unknown interaction with Gemini's processing
#
# 5. ROLLING CONTEXT / PERSONALIZATION (S19, S20) — Long-term improvement
#    Evidence: 40% WER reduction from same-speaker examples
#    Risk: Medium — requires state management, storage
