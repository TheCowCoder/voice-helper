patterns_found:
  - category: architecture
    pattern: "Single-pass zero-shot transcription"
    description: "The entire transcription pipeline is a single Gemini API call with no preprocessing, no multi-hypothesis generation, no post-processing correction, and no speaker adaptation."
    examples:
      - file: server.js
        location: "server.js:79-89"
        snippet: |
          const response = await ai.models.generateContent({
            model: 'gemini-3-flash-preview',
            contents: { parts: [
              { inlineData: { mimeType: mimeType || 'audio/webm', data: base64Audio } },
              { text: PROMPT_TEXT },
            ]},
            config: { temperature: 1, tools: [] },
          });
    prevalence: common

  - category: architecture
    pattern: "No audio preprocessing"
    description: "Raw MediaRecorder output is sent directly to the API. No gain normalization, no compression, no filtering, no silence trimming, no sample rate control."
    examples:
      - file: useAudioRecorder.ts
        location: "useAudioRecorder.ts:13"
        snippet: "const stream = await navigator.mediaDevices.getUserMedia({ audio: true });"
    prevalence: common

  - category: architecture
    pattern: "No structured output"
    description: "Gemini returns free-form text. No JSON schema for confidence scores, alternatives, or metadata. The Gemini API fully supports response_json_schema with structured outputs."
    examples:
      - file: server.js
        location: "server.js:88"
        snippet: "const text = typeof response.text === 'function' ? await response.text() : response.text;"
    prevalence: common

  - category: error_handling
    pattern: "Binary error state"
    description: "TranscriptionResult only has isError boolean — no granularity for confidence, partial results, or retry strategies."
    examples:
      - file: types.ts
        location: "types.ts:9-12"
        snippet: |
          export interface TranscriptionResult {
            text: string;
            isError: boolean;
          }
    prevalence: common

  - category: naming
    pattern: "Service singleton pattern"
    description: "GeminiService exported as singleton instance"
    examples:
      - file: geminiService.ts
        location: "geminiService.ts:44"
        snippet: "export const geminiService = new GeminiService();"
    prevalence: common

