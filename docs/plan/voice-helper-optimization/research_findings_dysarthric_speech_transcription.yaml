plan_id: voice-helper-optimization
objective: "Research optimizations for AI transcription of dysarthric/impaired speech in the Voice Helper web app"
focus_area: "Dysarthric speech transcription optimization — Gemini API, LLM post-ASR correction, audio preprocessing, speaker adaptation, prompt engineering"
created_at: "2026-07-08"
created_by: gem-researcher
status: completed

tldr: |
  - The dominant pattern in academic literature (2024-2026) is two-stage ASR+LLM correction: a first-pass ASR produces N-best hypotheses, then an LLM rewrites/corrects them — achieving 10-47% relative WER reductions on dysarthric speech (arXiv:2601.21347, arXiv:2509.25048, arXiv:2505.20163).
  - Zero-shot Gemini/GPT performance on severe dysarthria exceeds 49% WER; mild cases achieve 3-5% WER. Verbatim-transcription prompts help GPT-4o (-7.36pp WER) but degrade Gemini variants (arXiv:2512.17474). Prompt engineering is architecture-specific.
  - Speaker personalization via few-shot in-context learning achieves 13.9% WER on Euphonia (vs 17.5% baseline), with as few as 5-10 enrollment utterances yielding 40% WER reduction (arXiv:2509.15516). Two-stage SI→SS fine-tuning consistently improves on direct speaker-specific fine-tuning (arXiv:2603.15261).
  - The current Voice Helper uses a single zero-shot Gemini 3 Flash prompt with no preprocessing, no structured output, no N-best hypotheses, and no correction layer — all of which are supported improvements per the literature and Gemini API docs.
  - Key open question: Gemini's native audio understanding tokenizes at 32 tokens/sec with 16KHz downsampling — whether client-side Web Audio preprocessing (compression, filtering) helps or hurts this pipeline is untested.

