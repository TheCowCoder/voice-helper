        - "Severity-dependent degradation: mild dysarthria 3-5% WER; severe dysarthria >49% WER across ALL systems"
        - "Verbatim-transcription prompt: GPT-4o achieves -7.36pp WER reduction consistently; Gemini variants DEGRADE with same prompt"
