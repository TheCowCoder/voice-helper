external_research:
  sources:
    # --- API Documentation ---
    - id: S1
      title: "Gemini Audio Understanding API"
      url: "https://ai.google.dev/gemini-api/docs/audio-understanding"
      type: api_documentation
      key_findings:
        - "Audio tokenized at 32 tokens/second; input downsampled to 16KHz regardless of source sample rate"
        - "Supports WAV, MP3, FLAC, OGG, WebM — all formats the app could use"
        - "Maximum ~8.4 hours / 1M tokens per prompt for Gemini 3 series"
        - "Structured output (JSON schema) supported for audio transcription — can enforce confidence scores, alternatives, timestamps"
        - "audioTimestamp parameter in GenerationConfig enables timestamp understanding for audio-only files"
        - "Files API recommended for audio > 20MB"

    - id: S2
      title: "Gemini Thinking Mode"
      url: "https://ai.google.dev/gemini-api/docs/thinking"
      type: api_documentation
      key_findings:
        - "thinkingLevel supports: minimal, low, medium, high — configurable per request"
        - "Gemini 3 Flash Preview defaults to dynamic 'high' thinking"
        - "Thinking tokens are billed separately at reduced rates"
        - "Higher thinking levels improve complex reasoning tasks — potentially useful for interpreting ambiguous dysarthric speech"
        - "Can set thinkingBudget for token-level control"

    - id: S3
      title: "Gemini Structured Output / JSON Mode"
      url: "https://ai.google.dev/gemini-api/docs/structured-output"
      type: api_documentation
      key_findings:
        - "Set response_mime_type to 'application/json' and provide response_json_schema"
        - "Supports Pydantic (Python) and Zod (JavaScript) schema definitions"
        - "Can combine structured output with tools (Google Search, URL Context) in Gemini 3"
        - "Best practice: use 'description' field in schema to guide model output"
        - "Streaming supported for structured outputs"
        - "Validation: structured output guarantees syntactically correct JSON but not semantic correctness"

    - id: S4
      title: "Gemini Prompting Strategies"
      url: "https://ai.google.dev/gemini-api/docs/prompting-strategies"
      type: api_documentation
      key_findings:
        - "Few-shot examples strongly recommended over zero-shot for complex tasks"
        - "Gemini 3 specific: use XML tags for structure, explicit planning instructions improve output"
        - "Temperature=1.0 is recommended for Gemini 3 models (matches current app config)"
        - "Self-critique pattern: instruct model to evaluate and revise its own output"
        - "Context-first ordering: provide context/examples before instructions"

    - id: S5
      title: "Gemini System Instructions"
      url: "https://ai.google.dev/gemini-api/docs/text-generation"
      type: api_documentation
      key_findings:
        - "system_instruction config field sets persistent persona/constraints across multi-turn conversations"
        - "System instructions persist across all turns in a chat session"
        - "Can define expert persona, output format constraints, domain knowledge"

    - id: S6
      title: "Vertex AI Audio Understanding"
      url: "https://docs.cloud.google.com/vertex-ai/generative-ai/docs/multimodal/audio-understanding"
      type: api_documentation
      key_findings:
        - "Gemini 3.1 Pro Preview, Gemini 3 Flash Preview, Gemini 2.5 series all support audio transcription"
        - "Max ~8.4 hours per prompt, supports same audio formats"
        - "audioTimestamp parameter required for accurate timestamp generation"
        - "Limitation: 'models that support audio might make mistakes recognizing sound that is not speech'"

    - id: S7
      title: "Cloud Speech-to-Text Enhanced Models"
      url: "https://docs.cloud.google.com/speech-to-text/docs/enhanced-models"
      type: api_documentation
      key_findings:
        - "Enhanced phone_call and video models available — optimized for specific audio sources"
        - "Model adaptation available for domain-specific vocabulary"
        - "Medical models listed in navigation — specialized for clinical vocabulary"
        - "V2 API recommended for new projects; V1 still documented"

    # --- Web Audio API ---
    - id: S8
      title: "MDN Web Audio API"
      url: "https://developer.mozilla.org/en-US/docs/Web/API/Web_Audio_API"
      type: api_documentation
      key_findings:
        - "Full audio processing graph available in browser: AudioContext, MediaStreamAudioSourceNode"
        - "DynamicsCompressorNode: loudness normalization with threshold, knee, ratio, attack, release"
        - "BiquadFilterNode: lowpass, highpass, bandpass, notch, allpass, peaking, lowshelf, highshelf"
        - "GainNode: volume control/amplification"
        - "AnalyserNode: FFT analysis for visualizing/detecting signal quality"
        - "AudioWorklet: custom DSP processing in separate thread"
        - "OfflineAudioContext: process audio without real-time constraint"
        - "Can chain: MediaStream → GainNode → DynamicsCompressor → BiquadFilter → MediaRecorder"

    - id: S9
      title: "MDN DynamicsCompressorNode"
      url: "https://developer.mozilla.org/en-US/docs/Web/API/DynamicsCompressorNode"
      type: api_documentation
      key_findings:
        - "Properties: threshold (dB), knee (dB), ratio, reduction (read-only), attack (seconds), release (seconds)"
        - "Default values: threshold=-24, knee=30, ratio=12, attack=0.003, release=0.25"
        - "Purposes: normalize loudness variation, prevent clipping, boost quiet speech"
        - "Real-time processing — can be inserted into MediaRecorder pipeline"

    - id: S10
      title: "MDN AnalyserNode"
      url: "https://developer.mozilla.org/en-US/docs/Web/API/AnalyserNode"
      type: api_documentation
      key_findings:
        - "getFloatFrequencyData: frequency-domain analysis for signal quality assessment"
        - "getByteTimeDomainData: time-domain waveform for silence detection/VAD"
        - "fftSize configurable: 32 to 32768 samples"
        - "Can analyze audio in real-time to detect recording quality issues"

