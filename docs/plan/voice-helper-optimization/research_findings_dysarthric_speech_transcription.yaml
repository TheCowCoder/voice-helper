        - "14.51% WER reduction + substantial semantic gains: +7.59pp MENLI, +7.66pp Slot Micro F1"
        - "CRITICAL INSIGHT: WER is highly sensitive to domain shift; semantic metrics correlate more closely with downstream task performance"
        - "Implication for Voice Helper: semantic fidelity may matter more than exact word accuracy for communication"

